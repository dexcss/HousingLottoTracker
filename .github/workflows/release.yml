name: Build & Release

on:
  push:
    tags:
      - 'v*'   # push a tag like v1.0.0.0 to trigger a release

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download Dalamud
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile latest.zip
          Expand-Archive -Force latest.zip "$env:AppData\XIVLauncher\addon\Hooks\dev"
        shell: pwsh

      - name: Restore
        run: dotnet restore HousingLottoTracker/HousingLottoTracker.csproj

      - name: Build
        run: dotnet build HousingLottoTracker/HousingLottoTracker.csproj -c Release --no-restore

      - name: Clean output
        run: |
          $out = "HousingLottoTracker/bin/Release"

          # Remove DalamudPackager's nested packaged subfolder.
          $pkg = Join-Path $out "HousingLottoTracker"
          if (Test-Path $pkg) { Remove-Item $pkg -Recurse -Force; Write-Host "Removed nested packager folder." }

          # Drop debug symbols and any leftover zips.
          Get-ChildItem $out -Filter *.pdb | Remove-Item -Force
          Get-ChildItem $out -Filter *.zip | Remove-Item -Force

          # Newtonsoft.Json is provided by Dalamud at runtime.
          $njson = Join-Path $out "Newtonsoft.Json.dll"
          if (Test-Path $njson) { Remove-Item $njson -Force; Write-Host "Removed bundled Newtonsoft.Json." }

          Write-Host "Remaining top-level items:"
          Get-ChildItem $out | ForEach-Object { Write-Host "  $($_.Name)" }
        shell: pwsh

      - name: Package
        run: |
          $out = "HousingLottoTracker/bin/Release"
          Compress-Archive -Path "$out/*" -DestinationPath "$out/HousingLottoTracker.zip" -Force
          $size = (Get-Item "$out/HousingLottoTracker.zip").Length / 1MB
          Write-Host ("Final zip size: {0:N1} MB" -f $size)
        shell: pwsh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: HousingLottoTracker/bin/Release/HousingLottoTracker.zip
          generate_release_notes: true
